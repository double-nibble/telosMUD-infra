apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: telosmud

resources:
  - ../../base
  - ingress-staging.yaml

# Point image names at your GHCR owner; CI overwrites newTag with the built commit SHA.
images:
  - name: ghcr.io/OWNER/telos-world
    newName: ghcr.io/double-nibble/telos-world
    newTag: sha-1321619
  - name: ghcr.io/OWNER/telos-gate
    newName: ghcr.io/double-nibble/telos-gate
    newTag: sha-1321619
  - name: ghcr.io/OWNER/telos-account
    newName: ghcr.io/double-nibble/telos-account
    newTag: sha-1321619
  - name: ghcr.io/OWNER/telos-migrate
    newName: ghcr.io/double-nibble/telos-migrate
    newTag: sha-1321619
  - name: ghcr.io/OWNER/telos-seed
    newName: ghcr.io/double-nibble/telos-seed
    newTag: sha-1321619
  # db-init now runs telos-pull (external content store) instead of telos-seed. Pinned to `latest`: the
  # sha-1321619 build predates telos-pull being added to the engine release matrix, so it has no
  # sha-1321619 tag — `latest` resolves to the newest build once that engine PR merges + publishes.
  - name: ghcr.io/OWNER/telos-pull
    newName: ghcr.io/double-nibble/telos-pull
    newTag: latest

patches:
  - path: patch-staging.yaml
