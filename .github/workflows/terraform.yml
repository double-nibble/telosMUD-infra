name: terraform

# PR: plan both envs (review). Push to main: apply STAGING only. Production apply is MANUAL
# (workflow_dispatch, env=production) so a terraform/** push can never touch prod — prod is deferred.
on:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to plan + apply"
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read
  id-token: write # for the GitHub OIDC -> AWS role assumption (keyless auth)

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Ties the job to a GitHub Environment: `staging` is unprotected (auto), `production` has a required
    # reviewer → the run PAUSES for a one-click "Review deployments" approval before it starts. Production
    # only appears here via workflow_dispatch (the matrix below is staging-only on PR/push), so a PR can
    # never hang on the prod gate and prod plan+apply is always the deliberate, approved path.
    environment: ${{ matrix.env }}
    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch targets the ONE chosen env (staging or production). PR + push run STAGING
        # only — production is dispatch-only, so it's never planned/applied without the manual trigger.
        env: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.env)) || fromJSON('["staging"]') }}
    defaults:
      run:
        working-directory: terraform/envs/${{ matrix.env }}
    env:
      # Region the cluster deploys into (must match the tfvars default). The S3 state backend region
      # is pinned separately in backend.tf.
      AWS_REGION: us-east-1
      # NOTE: the assumed CI role is the Terraform APPLY principal, so it already gets cluster-admin via
      # enable_cluster_creator_admin_permissions — deploy.yml can kubectl apply with it. Do NOT also pass
      # it as admin_principal_arns: a second access entry for the same principal fails at apply
      # (ResourceInUseException). admin_principal_arns is only for OTHER principals (a human operator role).
    steps:
      - uses: actions/checkout@v4

      # Keyless AWS auth: assume the IAM role via GitHub's OIDC token. No long-lived access keys.
      # The role's trust policy must allow this repo's OIDC subject; see RUNBOOK §CI.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -no-color

      # APPLY ONLY EVER RUNS FROM main. Everything else — PRs and workflow_dispatch triggered from a
      # feature branch — runs init + plan and stops (the plan step above has no such guard). staging
      # auto-applies on push to main; production applies via workflow_dispatch, which is also pinned to
      # main so you can't apply a feature branch's terraform. (Non-main pushes don't trigger at all.)
      - name: Terraform apply
        if: >-
          github.ref == 'refs/heads/main' &&
          ((github.event_name == 'push' && matrix.env == 'staging') ||
           github.event_name == 'workflow_dispatch')
        run: terraform apply -input=false -auto-approve
