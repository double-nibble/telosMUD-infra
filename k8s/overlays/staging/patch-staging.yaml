# Staging = relaxed dev posture: plaintext telnet + bare-name auto-auth so you can smoke-test
# the telnet path without OAuth, and the keyless/tokenless insecure opt-ins the single-node
# cluster needs. NEVER copy these to production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate
spec:
  template:
    spec:
      containers:
        - name: gate
          env:
            - name: TELOS_GATE_ALLOW_PLAINTEXT
              value: "1"
            - name: TELOS_DEV_AUTOAUTH
              value: "1"
            # The gate refuses a non-loopback bind under dev-autoauth unless this ack is set.
            # Exposure is governed by the LoadBalancer Service, not the process bind.
            - name: TELOS_DEV_AUTOAUTH_ALLOW_REMOTE_BIND
              value: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: world
spec:
  template:
    spec:
      containers:
        - name: world
          env:
            # Single Redis-backed node is discoverable, so keyless handoffs need the dev opt-in.
            - name: TELOS_ALLOW_INSECURE
              value: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account
spec:
  template:
    spec:
      containers:
        - name: account
          env:
            - name: TELOS_ALLOW_INSECURE
              value: "1" # tokenless account gRPC (staging only)
            - name: TELOS_WEB_SECURE_COOKIES
              value: "0" # staging may be served over plain http
            - name: TELOS_WEB_PUBLIC_URL
              value: "http://staging.example.com:8080" # TODO: staging host/domain
            - name: TELOS_WEB_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: TELOS_WEB_SESSION_KEY
