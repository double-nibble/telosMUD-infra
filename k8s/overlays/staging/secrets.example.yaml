# TEMPLATE ONLY — dummy values. Copy to secrets.enc.yaml and encrypt in place:
#   cp secrets.example.yaml secrets.enc.yaml
#   sops --encrypt --in-place secrets.enc.yaml     # uses .sops.yaml age recipient
# Apply separately from `kustomize build` (see RUNBOOK): the plaintext never touches git.
apiVersion: v1
kind: Secret
metadata:
  name: telos-secrets
  namespace: telosmud
type: Opaque
stringData:
  # Keep POSTGRES_PASSWORD and the password inside TELOS_POSTGRES_DSN in sync.
  POSTGRES_PASSWORD: "change-me-staging"
  TELOS_POSTGRES_DSN: "postgres://telos:change-me-staging@postgres:5432/telosmud?sslmode=disable"
  TELOS_WEB_SESSION_KEY: "change-me-32+bytes-random"
