apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: telosmud

resources:
  - ../../base

# Point image names at your GHCR owner; CI overwrites newTag with the built commit SHA.
images:
  - name: ghcr.io/OWNER/telos-world
    newName: ghcr.io/OWNER/telos-world # TODO: set OWNER (e.g. ghcr.io/kscherer/telos-world)
    newTag: latest
  - name: ghcr.io/OWNER/telos-gate
    newName: ghcr.io/OWNER/telos-gate
    newTag: latest
  - name: ghcr.io/OWNER/telos-account
    newName: ghcr.io/OWNER/telos-account
    newTag: latest
  - name: ghcr.io/OWNER/telos-migrate
    newName: ghcr.io/OWNER/telos-migrate
    newTag: latest
  - name: ghcr.io/OWNER/telos-seed
    newName: ghcr.io/OWNER/telos-seed
    newTag: latest

patches:
  - path: patch-staging.yaml
