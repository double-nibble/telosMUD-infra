# Non-secret shared config. In-cluster service DNS (same namespace) resolves by service name.
# Secrets (TELOS_POSTGRES_DSN, session/signing keys, OAuth creds, POSTGRES_PASSWORD) live in the
# `telos-secrets` Secret, applied separately from the SOPS-encrypted overlay file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: telos-config
data:
  TELOS_REDIS_ADDR: "redis:6379"
  TELOS_NATS_URL: "nats://nats:4222"
  TELOS_WORLD_TARGET: "world:9090"
  TELOS_ACCOUNT_TARGET: "account:9100"
  # The enabled content pack set. Staging runs off the EXTERNAL content store (telosMUD-content),
  # imported by telos-pull (db-init) — so world AND account load the same `reference` pack (they must
  # match: the world applies the content trust-ladder as engine flags while account authorizes against
  # it). Shared here so every service inherits it via envFrom. (Empty would default to the embedded
  # `demo` fixture.)
  TELOS_CONTENT_PACKS: "reference"
  # NOTE: TELOS_ZONES is service-specific (world = zones HOSTED; gate = spawn zone), so it is
  # set per-Deployment, not here.
  # OTLP metrics/traces export (Observability 2, #7). Shared here so world, gate, and account all
  # inherit it via envFrom — the k8s equivalent of compose's x-otel-env anchor. account is included
  # deliberately: it serves the OAuth website, so its latency is player-visible. db-init also inherits
  # it but is a short-lived import job, and a metrics exporter that can't reach the collector just logs
  # a warning and no-ops (internal/obs), so that is harmless.
  #
  # The endpoint MUST carry a URL scheme: the OTel Go SDK parses OTEL_EXPORTER_OTLP_ENDPOINT as a URL,
  # and a bare "otel-collector:4317" is read as scheme="otel-collector" with an EMPTY address, so the
  # gRPC dial fails with "invalid target address" and metrics never leave the process. http:// selects
  # plaintext gRPC on the in-cluster network (the collector is ClusterIP, not internet-exposed).
  #
  # No OTEL_METRIC_EXPORT_INTERVAL override: the SDK default (60s) is right for a long-running
  # deployment on a 2-OCPU box (compose sets 5s only to keep sub-minute bot-swarm load runs fresh).
  # Until the collector exists (#9) the exporter init fails, warns, and degrades to metrics-off —
  # harmless, so this can land before the collector.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
