# Let's Encrypt production ClusterIssuer, HTTP-01 solver via Traefik (needs port 80 open + the
# domain's A-record pointing at the node). Install cert-manager first (see RUNBOOK), then apply this.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: kurt.scherer@gmail.com
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
