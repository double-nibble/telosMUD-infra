# Nightly logical backup: pg_dump the game database (custom format) and upload to OCI Object
# Storage (S3-compatible). This is the ONLY thing standing between a wiped boot volume and total
# data loss on this single-node/local-path-PVC topology — see issue #25 and RUNBOOK §Backups.
#
# Two stages in one pod so no credential ever touches the database container:
#   initContainer `dump`   — postgres:16.14-alpine (MUST equal the server minor, k8s/base/postgres.yaml:
#                            pg_dump older than the server is unsupported). pg_dump -Fc (custom,
#                            already compressed) via TELOS_POSTGRES_DSN into an emptyDir, then asserts
#                            the dump actually contains table data (a green job on an empty/wrong DB is
#                            worse than a red one). Runs to completion first; if it fails the upload
#                            never runs (init-container ordering is the gate).
#   container     `upload` — aws-cli to the OCI S3-compat endpoint, then SHREDS the local dump. Reads
#                            bucket/endpoint/creds from the out-of-band `backup-s3` Secret (per-cluster;
#                            NOT in git). Until that Secret exists the job fails loudly — the signal to
#                            wire it (RUNBOOK §Backups), not a default that backs up nowhere.
#
# Custom format (-Fc) over plain SQL is deliberate: restore is `pg_restore --clean --if-exists` onto
# the already-migrated DB (no DROP DATABASE dance), and supports SELECTIVE restore of just the durable
# player-state tables while db-init re-derives the reproducible content tables. See RUNBOOK §Backups.
#
# The dump is memory-backed (emptyDir medium: Memory) so a full-PII export never lands on the node
# boot disk (which the observability collector mounts read-only — collector.yaml). NetworkPolicy: the
# pod is labelled `app: pg-backup` so `allow-postgres` permits it to reach postgres:5432.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
spec:
  schedule: "17 3 * * *" # 03:17 UTC nightly
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600 # if the node was down at 03:17, still run when it returns within the hour
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      ttlSecondsAfterFinished: 600 # reap the pod (and its emptyDir) promptly — don't leave dumps lingering
      template:
        metadata:
          labels:
            app: pg-backup # allow-postgres NetworkPolicy keys off this
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false # never calls the k8s API
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: dump
              image: postgres:16.14-alpine
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-euc"]
              args:
                - |
                  set -o pipefail
                  # Wait for postgres to be REACHABLE before dumping. On k3s the bundled netpol
                  # controller (kube-router) programs the allow-postgres rule for THIS pod's IP a
                  # beat after the pod starts, so an immediate connect is REJECTed ("connection
                  # refused"). Poll pg_isready until the path is open (also covers a briefly-down DB).
                  echo "waiting for postgres reachability..."
                  for i in $(seq 1 20); do
                    pg_isready -q -d "$TELOS_POSTGRES_DSN" && break
                    echo "  not ready yet (attempt $i)"; sleep 3
                  done
                  pg_isready -q -d "$TELOS_POSTGRES_DSN" || { echo "postgres unreachable after retries"; exit 1; }
                  echo "dumping database (custom format)..."
                  pg_dump -Fc --no-owner --no-privileges "$TELOS_POSTGRES_DSN" > /backup/dump.dump
                  # Fail a "successful" but empty/degraded dump: a valid archive of a wiped or wrong DB
                  # still exits 0. Require it to carry actual table data before we ship it.
                  test -s /backup/dump.dump || { echo "dump is empty"; exit 1; }
                  tables=$(pg_restore -l /backup/dump.dump | grep -c 'TABLE DATA' || true)
                  echo "dump contains $tables tables of data ($(wc -c < /backup/dump.dump) bytes)"
                  [ "$tables" -ge 1 ] || { echo "dump has no table data — refusing to upload"; exit 1; }
              env:
                - name: TELOS_POSTGRES_DSN
                  valueFrom:
                    secretKeyRef:
                      name: telos-secrets
                      key: TELOS_POSTGRES_DSN
              volumeMounts:
                - name: scratch
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:2.17.18
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-euc"]
              args:
                - |
                  KEY="${BACKUP_PREFIX}/telosmud-$(date -u +%Y%m%dT%H%M%SZ).dump"
                  echo "uploading s3://${BACKUP_BUCKET}/${KEY}"
                  aws s3 cp /backup/dump.dump "s3://${BACKUP_BUCKET}/${KEY}" \
                    --endpoint-url "${BACKUP_S3_ENDPOINT}"
                  # Shred the plaintext PII dump off the node as soon as it's uploaded.
                  rm -f /backup/dump.dump
                  echo "backup complete: s3://${BACKUP_BUCKET}/${KEY}"
              envFrom:
                - secretRef:
                    name: backup-s3 # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, BACKUP_BUCKET, BACKUP_S3_ENDPOINT, BACKUP_PREFIX
              env:
                # OCI's S3-compat endpoint does not implement aws-chunked trailing checksums (the AWS
                # SDK/CLI enables them by default since 2025) — force checksums only when required, or
                # PutObject 501s. Same quirk the Terraform s3 backend hits (see terraform.yml).
                - name: AWS_REQUEST_CHECKSUM_CALCULATION
                  value: WHEN_REQUIRED
                - name: AWS_RESPONSE_CHECKSUM_VALIDATION
                  value: WHEN_REQUIRED
              volumeMounts:
                - name: scratch
                  mountPath: /backup
          volumes:
            - name: scratch
              emptyDir:
                medium: Memory # keep the full-PII dump off the node boot disk
                sizeLimit: 1Gi # job fails visibly if a future DB exceeds this rather than swallowing it
