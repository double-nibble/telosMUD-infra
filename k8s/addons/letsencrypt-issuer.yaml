# Let's Encrypt production ClusterIssuer, HTTP-01 solver via ingress-nginx (needs port 80 reachable
# on the ingress NLB + the domain CNAME'd at that NLB hostname). cert-manager + ingress-nginx are
# installed by terraform/modules/cluster-bootstrap; apply this add-on after the cluster is up (RUNBOOK).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: kurt.scherer@gmail.com
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
