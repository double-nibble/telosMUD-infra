# Staging web ingress: serve the account OAuth website (account:8080) through ingress-nginx with
# HTTPS. cert-manager issues a Let's Encrypt cert (HTTP-01, port 80) into staging-web-tls; nginx
# serves it on 443. The host is the stable domain, CNAME'd at the ingress-nginx NLB hostname (see
# RUNBOOK §DNS) — so this survives node replacements.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: account-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.telos.double-nibble.com
      secretName: staging-web-tls
  rules:
    - host: staging.telos.double-nibble.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: account
                port:
                  number: 8080
