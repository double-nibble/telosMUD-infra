# Loki (#8) — single-binary (-target=all), filesystem storage, on a single-node k3s cluster.
#
# RETENTION IS THE LOAD-BEARING PART (#8/#11). Loki deletes NOTHING by default: without
# compactor.retention_enabled logs live forever, and on this cluster local-path PVCs are just
# directories on the 50 GB node root FS with NO size enforcement — an unbounded Loki fills / and takes
# postgres/nats/world/gate/account down with it. So retention is configured HERE, before first ingest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels: { app: loki }
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /data
      storage:
        filesystem:
          chunks_directory: /data/chunks
          rules_directory: /data/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h          # 7d (minimum accepted is 24h; default 0s = forever)
      allow_structured_metadata: true # REQUIRED or Loki rejects OTLP payloads as malformed
      volume_enabled: true
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    compactor:
      working_directory: /data/retention
      retention_enabled: true         # ← without this, NOTHING is ever deleted
      delete_request_store: filesystem
      retention_delete_delay: 2h
      compaction_interval: 10m
    # No analytics phone-home from a private staging box.
    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels: { app: loki }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 3Gi # trimmed budget (#11): local-path does not enforce this; retention is the real bound
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels: { app: loki }
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO volume — never run two pods attaching it at once
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      securityContext:
        # otel-lgtm/loki images run as uid 10001; own the mounted volume so the filesystem store is writable.
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.5.2 # arm64-verified; Loki >= 3.0 for native OTLP ingest
          args: ["-config.file=/etc/loki/loki.yaml", "-target=all"]
          ports:
            - { name: http, containerPort: 3100 }
            - { name: grpc, containerPort: 9095 }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            # CPU limit >= 500m deliberately (#8): the compactor is bursty and throttling it makes retention
            # fall behind and never catch up, silently defeating the whole point.
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /data }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels: { app: loki }
spec:
  type: ClusterIP
  selector: { app: loki }
  ports:
    - { name: http, port: 3100, targetPort: http }
    - { name: grpc, port: 9095, targetPort: grpc }
