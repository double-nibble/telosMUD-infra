# Staging web ingress: serve the account OAuth website (account:8080) through k3s's bundled
# Traefik with HTTPS. cert-manager issues a Let's Encrypt cert (HTTP-01, port 80) into
# staging-web-tls; Traefik serves it on 443. The host is the stable domain, which points at the
# node's RESERVED public IP — so this survives instance recreations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: account-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - staging.telos.double-nibble.com
      secretName: staging-web-tls
  rules:
    - host: staging.telos.double-nibble.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: account
                port:
                  number: 8080
