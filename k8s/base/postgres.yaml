apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16.14-alpine # pinned: pg-backup's pg_dump must equal this minor (pg-backup.yaml)
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: telos
            - name: POSTGRES_DB
              value: telosmud
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "telos", "-d", "telosmud"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3 # EBS gp3 (default SC, EBS CSI). AZ-locked — the node group is single-AZ.
        resources:
          requests:
            storage: 10Gi
