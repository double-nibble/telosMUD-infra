# OTel Collector (#9) — the single ingest + collection point on k3s:
#   * OTLP receiver (:4317)  ← world/gate/account push metrics here (the otel-collector:4317 the #7
#     ConfigMap points them at); re-exposed on :8889 for Prometheus to scrape.
#   * filelog receiver       ← node container logs (/var/log/pods) → Loki over OTLP.
#   * hostmetrics receiver   ← node filesystem usage → :8889, which feeds the #11 NodeDiskFillingUp alert.
#
# One DaemonSet does all three. On this single-node cluster a Deployment (OTLP) + DaemonSet (logs) would
# collapse to the same thing; a DaemonSet also scales cleanly to N nodes (each node's OTLP ingest sits
# behind the Service, each reads its OWN node's logs, each reports its OWN disk) — so the split buys
# nothing here. It runs as root and host-mounts /var/log/pods (the log files are 0640 root:root) and /
# (read-only, for hostmetrics); the SA token IS mounted because k8sattributes calls the API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  labels: { app: otel-collector }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
  labels: { app: otel-collector }
rules:
  # k8sattributes needs to read pod/namespace/node metadata to tag logs so they join to metrics/traces.
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
  labels: { app: otel-collector }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: telosmud
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels: { app: otel-collector }
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
      filelog:
        include: [/var/log/pods/*/*/*.log]
        include_file_path: true
        start_at: end            # only new logs — never bulk-ingest history into Loki on first start
        operators:
          - type: container       # parses the CRI/containerd log format (bumped image: this operator has had fixes)
      hostmetrics:
        root_path: /hostfs        # the host root FS is mounted here so the scraper reports the node's real mountpoints
        collection_interval: 60s
        scrapers:
          filesystem:
            include_mount_points:
              match_type: strict   # REQUIRED — without it the pipeline BUILD fails (crash-loop); `validate` misses this
              mount_points: ["/"]  # only the root FS matters for the disk-fill alert
    processors:
      # memory_limiter FIRST in every pipeline: under a log burst the collector must shed load rather
      # than OOM against its 512Mi cgroup limit (start_at:end means it resumes with only a small gap).
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch: {}
      # Stamp the node name (from the downward API via OTEL_RESOURCE_ATTRIBUTES) onto metrics so the #11
      # disk alert's `sum by (host_name)` / annotation resolves to a real host instead of an empty label.
      resourcedetection:
        detectors: [env]
        timeout: 5s
        override: false
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          # filelog records carry k8s.pod.uid (the `container` operator extracts it from the log PATH);
          # associate on that so k8sattributes can attach deployment/node too (ip/connection don't exist
          # on file-based logs).
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources: [{ from: resource_attribute, name: k8s.pod.ip }]
          - sources: [{ from: connection }]
      # #454 defense-in-depth: even though the engine no longer logs raw player input unless
      # TELOS_LOG_RAW_INPUT is set (which staging does not), DROP any log record carrying a raw-input
      # value before it reaches the durable store — so a future upstream regression still cannot persist a
      # tell/chat/link-code. ONE precise condition PER site (msg PREFIX so "command handler panicked; zone
      # survived" matches, and the exact raw key for each — `arg` for a cast, `keywords` as a JSON array),
      # so it drops only the raw variant, never a legitimate redacted line. error_mode ignore = a
      # non-string body is simply not matched (kept). NOTE: this is world-engine-shaped only — it is NOT a
      # general PII scrubber for account/postgres logs; the real control is upstream services not logging
      # secrets. The filelog receiver reads ALL pods' logs on the node.
      filter/sensitive:
        error_mode: ignore
        logs:
          log_record:
            - 'IsMatch(body, "\"msg\":\"inbox: input\".*\"line\":")'
            - 'IsMatch(body, "\"msg\":\"input received\".*\"text\":")'
            - 'IsMatch(body, "\"msg\":\"dispatch\".*\"line\":")'
            - 'IsMatch(body, "\"msg\":\"unknown verb\".*\"verb\":\"")'
            - 'IsMatch(body, "\"msg\":\"command handler panicked.*\"line\":")'
            - 'IsMatch(body, "\"msg\":\"ability lifecycle: invoke\".*\"arg\":")'
            - 'IsMatch(body, "\"msg\":\"targeting: resolve\".*\"keywords\":")'
    exporters:
      debug:
        verbosity: normal
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true            # carry host.name (+ service.name) into labels so the disk alert can group by host
      # Loki OTLP endpoint gotcha (grafana/loki#14037): configure /otlp — the otlphttp exporter appends
      # /v1/logs itself. The full /otlp/v1/logs would become /otlp/v1/logs/v1/logs and 404.
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
    service:
      telemetry:
        logs:
          level: warn
      pipelines:
        metrics:
          receivers: [otlp, hostmetrics]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [prometheus]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, filter/sensitive, batch]
          exporters: [otlphttp/loki]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  labels: { app: otel-collector }
spec:
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsUser: 0 # /var/log/pods files are 0640 root:root — root is required to read node logs
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.116.1 # bumped from 0.110.0 (container-log parser fixes)
          args: ["--config=/etc/otel/collector.yaml"]
          env:
            # Feed the node name to the resourcedetection(env) processor so hostmetrics carry host.name.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "host.name=$(NODE_NAME)"
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: prom, containerPort: 8889 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/otel }
            - { name: varlogpods, mountPath: /var/log/pods, readOnly: true }
            - { name: hostfs, mountPath: /hostfs, readOnly: true }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
        - name: varlogpods
          hostPath: { path: /var/log/pods }
        - name: hostfs
          hostPath: { path: / }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels: { app: otel-collector }
spec:
  type: ClusterIP
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: prom, port: 8889, targetPort: prom }
