apiVersion: v1
kind: Service
metadata:
  name: gate
  # type: LoadBalancer + the NLB annotations -> AWS provisions an internet-facing Network Load
  # Balancer (L4) for this Service. An NLB is what makes the raw-TCP telnet front door work: it
  # forwards TCP untouched (no HTTP/TLS termination), unlike an ALB. This is a SEPARATE NLB from
  # ingress-nginx's (web :443) — the gate speaks telnet, not HTTP. The in-tree AWS cloud provider
  # handles this; no AWS Load Balancer Controller is required.
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"
spec:
  type: LoadBalancer
  # Preserve the real client IP to the gate. With target-type instance the DEFAULT (Cluster) policy
  # SNATs every telnet connection to a node IP — defeating per-IP rate limiting, connection caps, and
  # IP bans on this public raw-TCP port, and corrupting abuse/audit logs. Local keeps the source IP
  # (and gives the NLB real per-node health-check semantics). Single node, so no cross-node imbalance.
  externalTrafficPolicy: Local
  selector:
    app: gate
  ports:
    - name: telnet
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gate
  template:
    metadata:
      labels:
        app: gate
    spec:
      serviceAccountName: telos-init
      initContainers:
        # Gate needs the world (and, for account-backed login, the account) reachable first.
        - name: wait-world
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z world 9090; do echo waiting for world; sleep 2; done"]
      containers:
        - name: gate
          image: ghcr.io/OWNER/telos-gate
          env:
            - name: TELOS_SERVICE
              value: telos-gate
            - name: TELOS_GATE_LISTEN
              value: ":4000"
            # Spawn zone for fresh logins (distinct meaning from the world's hosted-zones list).
            - name: TELOS_ZONES
              value: "midgaard"
          envFrom:
            - configMapRef:
                name: telos-config
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
