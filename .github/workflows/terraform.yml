name: terraform

# PR: plan both envs (review). Push to main: apply STAGING only. Production apply is MANUAL
# (workflow_dispatch, env=production) so a terraform/** push can never touch prod — prod is deferred.
on:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to plan + apply"
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Ties the job to a GitHub Environment: `staging` is unprotected (auto), `production` has a required
    # reviewer → the run PAUSES for a one-click "Review deployments" approval before it starts. Production
    # only appears here via workflow_dispatch (the matrix below is staging-only on PR/push), so a PR can
    # never hang on the prod gate and prod plan+apply is always the deliberate, approved path.
    environment: ${{ matrix.env }}
    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch targets the ONE chosen env (staging or production). PR + push run STAGING
        # only — production is dispatch-only, so it's never planned/applied without the manual trigger.
        env: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.env)) || fromJSON('["staging"]') }}
    defaults:
      run:
        working-directory: terraform/envs/${{ matrix.env }}
    env:
      # OCI provider auth (config-file-less). Populate these as repo secrets.
      TF_VAR_region: ${{ secrets.OCI_REGION }}
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      # The other required vars (no defaults) — identifiers, not secrets, but stored as secrets to keep
      # the OCIDs out of the public repo. image_ocid is region-specific and ages out; bump it when the
      # base image is deprecated (bootstrap-local.sh discovers the newest locally). ssh key PATHS are set
      # in the SSH-key step below to the CI-created files.
      TF_VAR_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      TF_VAR_image_ocid: ${{ secrets.OCI_IMAGE_OCID }}
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
      # S3-compatible backend (OCI Object Storage) auth via a Customer Secret Key.
      AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
      # OCI's S3-compatible endpoint does not implement `aws-chunked` transfer encoding, which the AWS
      # Go SDK (used by the s3 backend) enables by DEFAULT since early 2025 to add trailing checksums —
      # causing state writes (PutObject) to fail with "501 NotImplemented: AWS chunked encoding not
      # supported". Force the SDK to only checksum when the API requires it, which drops aws-chunked.
      # (skip_s3_checksum in the backend block doesn't cover this newer SDK default.)
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      # The OCI Terraform provider authenticates from ~/.oci/config (API-key/DEFAULT profile), the same
      # as a local run — it does NOT read the OCI_CLI_* env vars (those are for the `oci` CLI). Write the
      # config + key from the secrets so the provider block (region = var.region) resolves credentials.
      - name: Write OCI provider config
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          region=${{ secrets.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      # The instance-authorized-keys var + the kubeconfig-fetch provisioner both read key files by PATH.
      # Write the private key from the secret, derive its public key, and point the path vars at them.
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/telos && chmod 600 ~/.ssh/telos
          ssh-keygen -y -f ~/.ssh/telos > ~/.ssh/telos.pub
          echo "TF_VAR_ssh_private_key_path=$HOME/.ssh/telos" >> "$GITHUB_ENV"
          echo "TF_VAR_ssh_public_key_path=$HOME/.ssh/telos.pub" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -no-color

      # STAGING auto-applies on push to main. PRODUCTION applies ONLY via manual workflow_dispatch
      # (its env isn't in the push matrix, so on push this step never even runs for prod).
      - name: Terraform apply
        if: >-
          (matrix.env == 'staging' && github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        run: terraform apply -input=false -auto-approve
