name: deploy

# Self-contained app deploy: fetch kubeconfig, CREATE the cluster Secrets from GitHub Actions secrets,
# apply the cert-manager ClusterIssuers, then render + apply the Kustomize overlay and wait for rollout.
# No manual kubectl/secret steps — everything the cluster needs is created here from GH secrets.
#
# Triggers: push to main touching k8s/**, manual dispatch, or workflow_call (from up.yml).
#
# REQUIRED GitHub Actions secrets:
#   AWS_ROLE_ARN            IAM role assumed via OIDC (already cluster-admin as the TF apply principal)
#   POSTGRES_PASSWORD       stable DB password (do NOT rotate casually — postgres sets it on first init)
#   TELOS_WEB_SESSION_KEY   web session signing key
# OPTIONAL:
#   TELOS_GITHUB_CLIENT_ID / TELOS_GITHUB_CLIENT_SECRET   real OAuth login (empty => pods start, no login)
#   GRAFANA_ADMIN_PASSWORD                                 Grafana admin (unset => Grafana pod won't start)
#   PRODUCTION only, for the hardened overlay:
#     TELOS_ACCOUNT_CALLER_TOKEN, TELOS_ACCOUNT_SIGNING_KEY, TELOS_ACCOUNT_VERIFY_KEY,
#     TELOS_HANDOFF_SIGNING_KEY, TELOS_HANDOFF_VERIFY_KEY
on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        type: choice
        options: [staging, production]
        default: staging
  workflow_call:
    inputs:
      env:
        description: "Environment to deploy"
        type: string
        required: true
  push:
    branches: [main]
    paths: ["k8s/**"]

permissions:
  contents: read
  id-token: write # GitHub OIDC -> AWS role assumption

jobs:
  deploy:
    runs-on: ubuntu-latest
    # `staging` deploys immediately; `production` pauses on the required-reviewer gate. Push always
    # targets staging (paths: k8s/**); production only via dispatch/workflow_call.
    environment: ${{ inputs.env || 'staging' }}
    env:
      AWS_REGION: us-east-1
      ENVIRONMENT: ${{ inputs.env || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl + kustomize
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl
          KUSTOMIZE_VERSION=v5.4.3
          curl -fsSLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz kustomize && sudo install kustomize /usr/local/bin/kustomize

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "telos-${ENVIRONMENT}" --region "${AWS_REGION}"
          kubectl get ns telosmud >/dev/null 2>&1 || kubectl create namespace telosmud

      - name: Create telos-secrets (from GitHub Actions secrets)
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TELOS_WEB_SESSION_KEY: ${{ secrets.TELOS_WEB_SESSION_KEY }}
          TELOS_GITHUB_CLIENT_ID: ${{ secrets.TELOS_GITHUB_CLIENT_ID }}
          TELOS_GITHUB_CLIENT_SECRET: ${{ secrets.TELOS_GITHUB_CLIENT_SECRET }}
          TELOS_ACCOUNT_CALLER_TOKEN: ${{ secrets.TELOS_ACCOUNT_CALLER_TOKEN }}
          TELOS_ACCOUNT_SIGNING_KEY: ${{ secrets.TELOS_ACCOUNT_SIGNING_KEY }}
          TELOS_ACCOUNT_VERIFY_KEY: ${{ secrets.TELOS_ACCOUNT_VERIFY_KEY }}
          TELOS_HANDOFF_SIGNING_KEY: ${{ secrets.TELOS_HANDOFF_SIGNING_KEY }}
          TELOS_HANDOFF_VERIFY_KEY: ${{ secrets.TELOS_HANDOFF_VERIFY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${POSTGRES_PASSWORD}" ] || [ -z "${TELOS_WEB_SESSION_KEY}" ]; then
            echo "::error::Missing required secrets POSTGRES_PASSWORD and/or TELOS_WEB_SESSION_KEY."
            echo "::error::Add them in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          # Base keys every env needs. The DSN embeds the same password postgres initializes with.
          args=(
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
            --from-literal=TELOS_POSTGRES_DSN="postgres://telos:${POSTGRES_PASSWORD}@postgres:5432/telosmud?sslmode=disable"
            --from-literal=TELOS_WEB_SESSION_KEY="${TELOS_WEB_SESSION_KEY}"
            --from-literal=TELOS_GITHUB_CLIENT_ID="${TELOS_GITHUB_CLIENT_ID}"
            --from-literal=TELOS_GITHUB_CLIENT_SECRET="${TELOS_GITHUB_CLIENT_SECRET}"
          )
          # Production overlay also references these (staging drops them via TELOS_ALLOW_INSECURE).
          if [ "${ENVIRONMENT}" = "production" ]; then
            for k in TELOS_ACCOUNT_CALLER_TOKEN TELOS_ACCOUNT_SIGNING_KEY TELOS_ACCOUNT_VERIFY_KEY \
                     TELOS_HANDOFF_SIGNING_KEY TELOS_HANDOFF_VERIFY_KEY; do
              if [ -z "${!k}" ]; then
                echo "::error::production requires secret ${k}"; exit 1
              fi
              args+=(--from-literal=${k}="${!k}")
            done
          fi
          kubectl -n telosmud create secret generic telos-secrets "${args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create grafana-admin (optional)
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${GRAFANA_ADMIN_PASSWORD}" ]; then
            echo "::notice::GRAFANA_ADMIN_PASSWORD unset — skipping. Grafana will not start until it exists."
            exit 0
          fi
          kubectl -n telosmud create secret generic grafana-admin \
            --from-literal=admin-password="${GRAFANA_ADMIN_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply cert-manager ClusterIssuers
        run: |
          set -euo pipefail
          # Wait for the cert-manager webhook (installed by Terraform) before applying CRD objects.
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s
          kubectl apply -f k8s/addons/letsencrypt-issuer.yaml        # HTTP-01 (web certs)
          if [ "${ENVIRONMENT}" = "production" ]; then
            kubectl apply -f k8s/addons/letsencrypt-dns01.yaml       # DNS-01 (gate telnet-TLS cert)
          fi

      - name: Recreate db-init job (Jobs are immutable) to re-run migrate + content import
        run: kubectl -n telosmud delete job db-init --ignore-not-found

      - name: Deploy
        run: kustomize build "k8s/overlays/${ENVIRONMENT}" | kubectl apply -f -

      - name: Wait for content import + rollout
        run: |
          set -euo pipefail
          kubectl -n telosmud wait --for=condition=complete job/db-init --timeout=300s
          kubectl -n telosmud rollout status deploy/world --timeout=300s
          kubectl -n telosmud rollout status deploy/gate --timeout=300s
          kubectl -n telosmud rollout status deploy/account --timeout=300s
