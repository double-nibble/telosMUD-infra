# Staging posture: plaintext telnet (no TLS) + real GitHub OAuth (same as prod, exercising the
# real login path on the same hardened release images), plus the keyless/tokenless insecure
# opt-ins the single-node cluster needs. NEVER copy the insecure/plaintext bits to production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate
spec:
  template:
    spec:
      containers:
        - name: gate
          env:
            # Plain telnet on :4000 (no TLS in staging). Login is account-backed OAuth: the gate
            # hands out a link-code URL (TELOS_ACCOUNT_TARGET is wired in the base config).
            - name: TELOS_GATE_ALLOW_PLAINTEXT
              value: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: world
spec:
  template:
    spec:
      containers:
        - name: world
          env:
            # Single Redis-backed node is discoverable, so keyless handoffs need the dev opt-in.
            - name: TELOS_ALLOW_INSECURE
              value: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account
spec:
  template:
    spec:
      containers:
        - name: account
          env:
            - name: TELOS_ALLOW_INSECURE
              value: "1" # tokenless account gRPC (staging only)
            - name: TELOS_WEB_SECURE_COOKIES
              value: "1" # served over HTTPS (Let's Encrypt via cert-manager)
            # Public base URL the /login link + OAuth callback derive from (stable domain).
            - name: TELOS_WEB_PUBLIC_URL
              value: "https://staging.telos.double-nibble.com"
            - name: TELOS_WEB_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: TELOS_WEB_SESSION_KEY
            - name: TELOS_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: TELOS_GITHUB_CLIENT_ID
            - name: TELOS_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: TELOS_GITHUB_CLIENT_SECRET
