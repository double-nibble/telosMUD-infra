apiVersion: v1
kind: Service
metadata:
  name: world
spec:
  selector:
    app: world
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: world
spec:
  replicas: 1
  strategy:
    type: Recreate # single-writer per zone: never run two world pods for the same zone at once
  selector:
    matchLabels:
      app: world
  template:
    metadata:
      labels:
        app: world
    spec:
      serviceAccountName: telos-init
      initContainers:
        - name: wait-db-init
          image: rancher/kubectl:v1.33.1 # keep within one minor of the EKS control plane (1.33)
          command: ["kubectl", "wait", "--for=condition=complete", "--timeout=600s", "job/db-init"]
      containers:
        - name: world
          image: ghcr.io/OWNER/telos-world
          args: [] # config is entirely via env
          env:
            - name: TELOS_SERVICE
              value: telos-world
            - name: TELOS_WORLD_LISTEN
              value: ":9090"
            - name: TELOS_SHARD_ADDR
              value: "world:9090"
            - name: TELOS_SHARD_ID
              value: "shard-a"
            # Single shard hosts ALL zones; the market<->grove boundary is crossed in-process. `overworld`
            # is the wilderness plains between midgaard and darkwood (content v0.2.0) — it MUST be hosted here
            # or the market `exit` into it (and the plains->darkwood `enter`) is a sealed boundary.
            - name: TELOS_ZONES
              value: "midgaard,darkwood,crypt,overworld"
            - name: TELOS_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: telos-secrets
                  key: TELOS_POSTGRES_DSN
          envFrom:
            - configMapRef:
                name: telos-config
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
